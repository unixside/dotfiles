source = $HOME/.config/hypr/rose-pine.conf

$accent = $text
$accentAlpha = $muted
$font = JetBrainsMono Nerd Font

# GENERAL
general {
  disable_loading_bar = true
  hide_cursor = true
}

# BACKGROUND
background {
  monitor =
  path = /tmp/image_block.png
  blur_passes = 0
  color = $base
}

# TIME
label {
  monitor =
  text = $TIME
  color = $text
  font_size = 150
  font_family = Yanone Kaffeesatz
  position = 0, 220
  halign = center
  valign = center
}

# DATE
label {
  monitor =
  text = cmd[update:43200000] date +"%A, %d %B %Y"
  color = $text
  font_size = 50
  font_family = Yanone Kaffeesatz ExtraLight
  position = 0, 100
  halign = center
  valign = center
}

# INPUT FIELD
input-field {
  monitor =
  size = 300, 60
  outline_thickness = 4
  dots_size = 0.2
  dots_spacing = 0.2
  dots_center = true
  outer_color = rgba(255,255,255,0.3)
  inner_color = rgba(255,255,255,0.1)
  font_color = $base
  fade_on_empty = true
  fade_timeout = 1000
  placeholder_text = 
  hide_input = false
  check_color = $base
  fail_color = $love
  fail_text = <i>$FAIL <b>($ATTEMPTS)</b></i>
  capslock_color = $gold
  position = 0, -47
  halign = center
  valign = center
}
